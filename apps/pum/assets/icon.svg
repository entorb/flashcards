<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <title>Plumi</title>
  <!-- White background -->
  <rect x="0" y="0" width="100" height="100" fill="#FFFFFF"/>
  <!-- Body -->
  <ellipse cx="50" cy="70" rx="22" ry="18" fill="#78909C"/>
  <!-- Tail (striped) -->
  <path d="M 28,68 Q 14,55 10,42 Q 8,36 14,38 Q 20,40 24,50 Q 28,58 30,65" fill="#607D8B" stroke="#37474F" stroke-width="1"/>
  <!-- Tail stripes -->
  <path d="M 16,42 Q 18,46 22,50" stroke="#37474F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 20,48 Q 22,52 25,56" stroke="#37474F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="50" cy="40" r="20" fill="#90A4AE"/>
  <!-- Ears -->
  <circle cx="34" cy="24" r="7" fill="#607D8B"/>
  <circle cx="34" cy="24" r="4" fill="#B0BEC5"/>
  <circle cx="66" cy="24" r="7" fill="#607D8B"/>
  <circle cx="66" cy="24" r="4" fill="#B0BEC5"/>
  <!-- Eye mask (raccoon characteristic) -->
  <ellipse cx="40" cy="38" rx="9" ry="6" fill="#37474F"/>
  <ellipse cx="60" cy="38" rx="9" ry="6" fill="#37474F"/>
  <!-- Eyes -->
  <circle cx="40" cy="38" r="3" fill="#FFFFFF"/>
  <circle cx="60" cy="38" r="3" fill="#FFFFFF"/>
  <circle cx="41" cy="37" r="1.5" fill="#000000"/>
  <circle cx="61" cy="37" r="1.5" fill="#000000"/>
  <!-- Light muzzle area -->
  <ellipse cx="50" cy="48" rx="8" ry="6" fill="#CFD8DC"/>
  <!-- Nose -->
  <ellipse cx="50" cy="46" rx="3" ry="2" fill="#263238"/>
  <!-- Smile -->
  <path d="M 43,52 Q 50,58 57,52" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="40" cy="88" rx="6" ry="3" fill="#455A64"/>
  <ellipse cx="60" cy="88" rx="6" ry="3" fill="#455A64"/>
</svg>
