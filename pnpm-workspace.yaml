packages:
  - apps/*
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  cypress: true
  esbuild: true

onlyBuiltDependencies:
  - '@parcel/watcher'
  - cypress
  - esbuild

overrides:
  minimatch@>=10.0.0 <10.2.1: '>=10.2.1'
  minimatch@>=10.0.0 <10.2.3: '>=10.2.3'
  serialize-javascript@<7.0.5: '>=7.0.5'
  serialize-javascript@<=7.0.2: '>=7.0.3'
